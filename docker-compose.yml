services:
  db:
    image: postgres:17.5
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: financial_controller
    ports:
      - "5432:5432"
    volumes:
      - ./infra/data/postgres:/var/lib/postgresql/data
    networks:
      - financial_controller_network

  # AUTO
  backend-auto:
    profiles: ["auto"]
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /workspace
    volumes:
      - ./backend:/workspace
    ports:
      - "5000:5000"
    networks:
      - financial_controller_network
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - db
    command: >
      /bin/sh -c "
      dotnet tool restore &&
      dotnet restore &&
      dotnet ef database update &&
      dotnet run --urls=http://+:5000
      "

  frontend-auto:
    profiles: ["auto"]
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    networks:
      - financial_controller_network
    command: >
      /bin/sh -c "
      npm install &&
      npm run dev -- --host
      "

  # MANUAL
  backend-manual:
    profiles: ["manual"]
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /workspace
    volumes:
      - ./backend:/workspace
    ports:
      - "5000:5000"
    networks:
      - financial_controller_network
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - db
    command: /bin/sh -c "dotnet tool restore && dotnet restore && sleep infinity"

  frontend-manual:
    profiles: ["manual"]
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    networks:
      - financial_controller_network
    command: /bin/sh -c "npm install && sleep infinity"

networks:
  financial_controller_network:
    name: financial_controller_network
    driver: bridge