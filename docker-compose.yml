services:
  db:
    image: postgres:17.5
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: financial_controller
    ports:
      - "5432:5432"
    volumes:
      - ./infra/data/postgres:/var/lib/postgresql/data
    networks:
      - financial_controller_network

  backend:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: financial_controller_backend_dev
    working_dir: /workspace
    volumes:
      - ./backend:/workspace
    networks:
      - financial_controller_network
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
    depends_on:
      - db
    command: /bin/sh -c "cd /workspace && dotnet tool restore && dotnet restore && sleep infinity"

  frontend:
    image: node:20
    container_name: financial_controller_frontend_dev
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: /bin/sh -c "npm install && npm run dev -- --host"
    networks:
      - financial_controller_network

volumes:
  postgres_db_data:

networks:
  financial_controller_network:
    name: financial_controller_network
    driver: bridge